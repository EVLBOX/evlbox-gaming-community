# Gaming Community in a Box — Docker Compose Stack
# https://github.com/EVLBOX/evlbox-gaming-community
#
# Stoat (chat) runs as a separate compose project in /opt/evlbox/stoat.
# Optional services use Docker Compose profiles — toggle via COMPOSE_PROFILES in .env.
#
# Profiles: forum, blog, wiki, paste, voice
# Default: all enabled. Use setup.sh or `evlbox enable/disable <service>` to toggle.

services:
  # ===========================================================================
  # REVERSE PROXY (always on)
  # ===========================================================================
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./templates/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - default
      - evlbox

  # ===========================================================================
  # MUMBLE — Voice Chat (profile: voice)
  # ===========================================================================
  mumble:
    image: mumblevoip/mumble-server:latest
    restart: unless-stopped
    profiles: ["voice"]
    ports:
      - "64738:64738"
      - "64738:64738/udp"
    volumes:
      - mumble_data:/data
    environment:
      - MUMBLE_SUPERUSER_PASSWORD=${MUMBLE_SUPERUSER_PASSWORD}

  # ===========================================================================
  # FLARUM — Forum (profile: forum)
  # ===========================================================================
  flarum:
    image: crazymax/flarum:latest
    restart: unless-stopped
    profiles: ["forum"]
    volumes:
      - flarum_data:/data
    environment:
      - DB_HOST=mariadb
      - DB_NAME=${FLARUM_DB_NAME}
      - DB_USER=${FLARUM_DB_USER}
      - DB_PASSWORD=${FLARUM_DB_PASSWORD}
      - FLARUM_BASE_URL=${FLARUM_BASE_URL}
      - FLARUM_FORUM_TITLE=Gaming Community
      - FLARUM_ADMIN_USER=${FLARUM_ADMIN_USER}
      - FLARUM_ADMIN_PASSWORD=${FLARUM_ADMIN_PASSWORD}
      - FLARUM_ADMIN_EMAIL=${FLARUM_ADMIN_EMAIL}
      - REAL_IP_FROM=172.16.0.0/12
      - REAL_IP_HEADER=X-Forwarded-For
    depends_on:
      - mariadb

  # ===========================================================================
  # GHOST — Community Blog (profile: blog)
  # ===========================================================================
  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    profiles: ["blog"]
    volumes:
      - ghost_data:/var/lib/ghost/content
    environment:
      - url=https://${GHOST_URL}
      - database__client=mysql
      - database__connection__host=mariadb
      - database__connection__database=${GHOST_DB_NAME}
      - database__connection__user=${GHOST_DB_USER}
      - database__connection__password=${GHOST_DB_PASSWORD}
    depends_on:
      - mariadb

  # ===========================================================================
  # BOOKSTACK — Wiki (profile: wiki)
  # ===========================================================================
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    restart: unless-stopped
    profiles: ["wiki"]
    volumes:
      - bookstack_data:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - APP_URL=https://${BOOKSTACK_URL}
      - DB_HOST=mariadb
      - DB_DATABASE=${BOOKSTACK_DB_NAME}
      - DB_USERNAME=${BOOKSTACK_DB_USER}
      - DB_PASSWORD=${BOOKSTACK_DB_PASSWORD}
    depends_on:
      - mariadb

  # ===========================================================================
  # PRIVATEBIN — Paste Service (profile: paste)
  # ===========================================================================
  privatebin:
    image: privatebin/nginx-fpm-alpine:latest
    restart: unless-stopped
    profiles: ["paste"]
    volumes:
      - privatebin_data:/srv/data
    tmpfs:
      - /tmp
      - /run:exec

  # ===========================================================================
  # MARIADB — Shared Database (profile: mariadb)
  # Started automatically when forum or blog is enabled.
  # ===========================================================================
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    profiles: ["forum", "blog", "wiki"]
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./templates/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  evlbox:
    name: evlbox
    external: true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  caddy_data:
  caddy_config:
  mumble_data:
  flarum_data:
  ghost_data:
  bookstack_data:
  privatebin_data:
  mariadb_data:
