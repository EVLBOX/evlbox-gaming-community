# Override for Stoat self-hosted compose.
# Stoat's built-in Caddy binds host ports 80/443 which conflict with ours.
# Docker Compose overrides MERGE port lists so we can't clear them — instead
# we disable their Caddy and run a lightweight sidecar that reads the same
# Caddyfile for internal path routing (/api, /ws, /autumn, /january, etc.)
# without any host port bindings. Our stack Caddy proxies to this sidecar.
# Copied to /opt/evlbox/stoat/compose.override.yml by setup.sh

services:
  # Disable Stoat's Caddy to prevent port conflict
  caddy:
    entrypoint: ["true"]
    restart: "no"

  # Internal proxy — reads Stoat's Caddyfile, no host ports
  stoat-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - HOSTNAME=:80
    networks:
      default: {}
      evlbox:
        aliases:
          - stoat-caddy

networks:
  evlbox:
    name: evlbox
    external: true
