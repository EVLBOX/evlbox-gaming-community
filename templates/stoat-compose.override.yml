# Override for Stoat self-hosted compose.
# Exposes Stoat's Caddy on the shared evlbox network so our stack Caddy
# can reverse proxy to it. Stoat's Caddy handles all internal path routing
# (/api, /ws, /autumn, /january, etc.) — we don't touch any of that.
# Copied to /opt/evlbox/stoat/compose.override.yml by setup.sh

services:
  caddy:
    environment:
      - HOSTNAME=:80
    networks:
      default: {}
      evlbox:
        aliases:
          - stoat-caddy

networks:
  evlbox:
    name: evlbox
    external: true
